{% extends 'base.html' %}
{% block title %}Settings{% endblock %}
{% block content %}
<div class="container my-4">
    <h2><i class="fas fa-cog me-2 text-primary"></i>System Settings</h2>

    <div class="row g-4 mt-3">
        <div class="col-lg-6">
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0"><i class="fab fa-telegram me-2"></i>Telegram Bot</h5>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3"><label class="form-label">Bot Token</label><input type="text"
                                class="form-control" name="telegram_token" value="{{ telegram_token }}"></div>
                        <div class="mb-3"><label class="form-label">Bot Username</label><input type="text"
                                class="form-control" name="telegram_username" placeholder="@YourBot"></div>
                        <button type="submit" class="btn btn-primary">Save</button>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-lg-6">
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0"><i class="fas fa-brain me-2"></i>AI Configuration</h5>
                </div>
                <div class="card-body">
                    <p class="text-muted">Current provider: <strong>{{ ai_settings.get('provider', 'gemini') }}</strong>
                    </p>
                    <p class="text-muted small">AI settings are configured via environment variables (.env file).</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
