{% extends 'base.html' %}
{% block title %}Edit Department{% endblock %}
{% block content %}
<div class="container my-4">
    <h2><i class="fas fa-edit me-2 text-primary"></i>Edit Department: {{ department.name }}</h2>
    <form method="POST" class="mt-4" style="max-width:600px">
        <div class="mb-3"><label class="form-label">Name</label><input type="text" class="form-control" name="name"
                value="{{ department.name }}" required></div>
        <div class="mb-3"><label class="form-label">Code</label><input type="text" class="form-control" name="code"
                value="{{ department.get('code', '') }}" required></div>
        <div class="mb-3">
            <label class="form-label">Faculty</label>
            <select class="form-select" name="faculty_id" required>
                {% for f in faculties %}<option value="{{ f.id }}" {{ 'selected' if department.get('faculty_id')==f.id
                    }}>{{ f.name }}</option>{% endfor %}
            </select>
        </div>
        <div class="mb-3"><label class="form-label">Description</label><textarea class="form-control" name="description"
                rows="3">{{ department.get('description', '') }}</textarea></div>
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{{ url_for('superadmin_bp.departments') }}" class="btn btn-secondary ms-2">Cancel</a>
    </form>
</div>
{% endblock %}
