{% extends 'base.html' %}
{% block title %}Edit Batch{% endblock %}
{% block content %}
<div class="container my-4">
    <h2><i class="fas fa-edit me-2 text-primary"></i>Edit Batch: {{ batch.name }}</h2>
    <form method="POST" class="mt-4" style="max-width:600px">
        <div class="mb-3"><label class="form-label">Name</label><input type="text" class="form-control" name="name"
                value="{{ batch.name }}" required></div>
        <div class="mb-3"><label class="form-label">Code</label><input type="text" class="form-control" name="code"
                value="{{ batch.get('code', '') }}"></div>
        <div class="mb-3">
            <label class="form-label">Department</label>
            <select class="form-select" name="department_id" required>
                {% for d in departments %}<option value="{{ d.id }}" {{ 'selected' if batch.get('department_id')==d.id
                    }}>{{ d.name }}</option>{% endfor %}
            </select>
        </div>
        <div class="mb-3"><label class="form-label">Year</label><input type="text" class="form-control" name="year"
                value="{{ batch.get('year', '') }}"></div>
        <div class="mb-3">
            <label class="form-label">Batch Representative</label>
            <select class="form-select" name="rep_user_id">
                <option value="">— None —</option>
                {% for r in batch_reps %}<option value="{{ r.id }}" {{ 'selected' if batch.get('rep_user_id')==r.id }}>
                    {{ r.name }}</option>{% endfor %}
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{{ url_for('superadmin_bp.batches') }}" class="btn btn-secondary ms-2">Cancel</a>
    </form>
</div>
{% endblock %}
