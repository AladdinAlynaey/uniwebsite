{% extends 'base.html' %}

{% block title %}Edit Student{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row">
        <div class="col-12">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="{{ url_for('main_bp.index') }}">Home</a></li>
                    <li class="breadcrumb-item"><a href="{{ url_for('admin_bp.dashboard') }}">Admin</a></li>
                    <li class="breadcrumb-item"><a href="{{ url_for('admin_bp.students') }}">Students</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Edit Student</li>
                </ol>
            </nav>
            
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h5 class="card-title mb-0">Edit Student</h5>
                </div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('admin_bp.edit_student', student_id=student.id) }}">
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label for="name" class="form-label">Full Name</label>
                                <input type="text" class="form-control" id="name" name="name" value="{{ student.name }}" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="major" class="form-label">Major</label>
                                <input type="text" class="form-control" id="major" name="major" value="{{ student.major }}" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="level" class="form-label">Level</label>
                                <select class="form-select" id="level" name="level" required>
                                    <option value="" disabled>Select Level</option>
                                    <option value="1" {% if student.level == '1' %}selected{% endif %}>Level 1</option>
                                    <option value="2" {% if student.level == '2' %}selected{% endif %}>Level 2</option>
                                    <option value="3" {% if student.level == '3' %}selected{% endif %}>Level 3</option>
                                    <option value="4" {% if student.level == '4' %}selected{% endif %}>Level 4</option>
                                </select>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="token" class="form-label">Token</label>
                                <div class="input-group">
                                    <input type="text" class="form-control" id="token" name="token" value="{{ student.token }}" readonly>
                                    <button class="btn btn-outline-secondary copy-btn" type="button" data-clipboard-text="{{ student.token }}">
                                        <i class="fas fa-copy"></i>
                                    </button>
                                </div>
                                <small class="text-muted">This token is used for student login.</small>
                            </div>
                        </div>
                        <div class="mt-4">
                            <a href="{{ url_for('admin_bp.students') }}" class="btn btn-secondary me-2">Cancel</a>
                            <button type="submit" class="btn btn-primary">Save Changes</button>
                        </div>
                    </form>
                    
                    <!-- Separate delete form -->
                    <form method="POST" action="{{ url_for('admin_bp.delete_student', student_id=student.id) }}" class="mt-3" onsubmit="return confirm('Are you sure you want to delete this student? This action cannot be undone.');">
                        <button type="submit" class="btn btn-danger">
                            <i class="fas fa-trash me-1"></i> Delete Student
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/clipboard.js/2.0.8/clipboard.min.js"></script>
<script>
    // Initialize clipboard.js
    var clipboard = new ClipboardJS('.copy-btn');
    
    clipboard.on('success', function(e) {
        // Change button text temporarily
        var originalHTML = e.trigger.innerHTML;
        e.trigger.innerHTML = '<i class="fas fa-check"></i>';
        
        // Reset button after 1 second
        setTimeout(function() {
            e.trigger.innerHTML = originalHTML;
        }, 1000);
        
        e.clearSelection();
    });
</script>
{% endblock %}
